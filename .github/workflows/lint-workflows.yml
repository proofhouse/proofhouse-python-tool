---
# Lint every workflow under `.github/workflows/` via actionlint,
# delegated to the reusable workflow in proofhouse/github-actions. The
# shared workflow runs actionlint from its SHA-pinned Docker image
# (which bundles shellcheck) against this repo's checkout, and this
# repo's .github/actionlint.yaml still applies. The job fires on every
# PR that touches a workflow file and on every push to `main`, guarding
# both ends of the integration path.
#
# Caller-level concurrency is deliberately omitted: the reusable
# workflow already declares `group: ${{ github.workflow }}-${{ github.ref }}`,
# which evaluates in this caller's context (so it still cancels
# superseded PR runs). Repeating the same group here would make the run
# share a concurrency group with itself and deadlock.

name: lint-workflows

on:
  push:
    branches: [main]
    paths: ['.github/workflows/**']
  pull_request:
    paths: ['.github/workflows/**']

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    permissions:
      contents: read
    # yamllint disable-line rule:line-length
    uses: proofhouse/github-actions/.github/workflows/lint-workflows.yml@8fc147c5b166239ee72e04ffc17dc85a40888d0e # v0.2.1
