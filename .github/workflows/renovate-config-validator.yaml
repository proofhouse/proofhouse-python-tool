---
# PR gate that catches broken Renovate config before it lands on main,
# delegated to the shared reusable workflow in proofhouse/github-actions.
# The reusable workflow runs the SHA-pinned renovate-config-validator image
# against .github/renovate.json5 (its default config_path), so this caller
# only supplies the pull_request trigger.
name: Validate Renovate configuration

on:
  pull_request:
    paths:
      # Catch nested renovate configs too if/when subprojects appear.
      - "**renovate.json5"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Renovate configuration
    permissions:
      contents: read
    # yamllint disable-line rule:line-length
    uses: proofhouse/github-actions/.github/workflows/renovate-config-validator.yaml@8fc147c5b166239ee72e04ffc17dc85a40888d0e # v0.2.1
