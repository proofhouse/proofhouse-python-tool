---
# Diff-scoped mutation gate. Where mutation-nightly.yml sweeps the whole
# package and only reports, this one fails a pull request when a mutant
# survives on the surface the branch touched. tools/mutscope.py reads the
# diff against the base branch, keeps the changed first-party modules plus
# the modules that import them, and hands cosmic-ray a config narrowed to
# that set; the run then demands every one of those mutants die. Scoping to
# the diff is what makes a per-PR mutation gate affordable — the full
# per-mutant rerun that the nightly pays for would be far too slow and too
# jittery to block a merge, but a handful of changed modules finishes fast
# and kills deterministically.
#
# Pull-request only: the gate needs a base ref to diff HEAD against, which a
# push to main does not carry. A branch with no first-party source change
# produces an empty scope and passes as a no-op.

name: mutation-diff

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutate-diff:
    name: mutate-diff
    runs-on: ubuntu-24.04
    # The diff set is small, but each mutant still reruns the whole suite,
    # so the ceiling tracks the number of changed-plus-dependent modules.
    # The current package is tiny; keep the budget ample and revisit as the
    # surface grows.
    timeout-minutes: 30
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # mutscope diffs HEAD against the base branch, so the clone needs full
      # history rather than the default shallow fetch.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up just
        uses: proofhouse/github-actions/.github/actions/setup-just@8fc147c5b166239ee72e04ffc17dc85a40888d0e # v0.2.1

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      # A PR checkout does not leave the base branch as a tracking ref, so
      # fetch it before mutscope resolves origin/<base> as the diff base.
      - name: Run diff-scoped mutation gate
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          just mutate-diff "origin/${{ github.base_ref }}"
