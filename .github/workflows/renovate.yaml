---
# Self-hosted Renovate, delegated to the shared reusable workflow in
# proofhouse/github-actions so this repo no longer carries the App-token
# mint and renovate-action wiring itself. The reusable workflow checks out
# this repo's tree, reads .github/renovate.json5, and authenticates as the
# proofhouse-renovate[bot] GitHub App. `secrets: inherit` forwards the
# RENOVATE_CLIENT_ID / RENOVATE_PRIVATE_KEY org secrets this repo inherits,
# which the App-token step needs.
#
# The shared workflow runs Renovate plainly with its default
# binarySource=install, so the uv binary the pep621 manager needs to
# refresh uv.lock after a dependency bump installs inside the Renovate
# container; no extra wiring is required here.
name: Renovate

on:
  schedule:
    # Hourly on weekdays, every two hours on weekends. Matches Cilium's
    # cadence: fast enough to catch CVEs the same business day, slack
    # enough to avoid wasting API budget on quiet weekends.
    - cron: "0 * * * 1-5"
    - cron: "0 */2 * * 6,0"
  workflow_dispatch:
    inputs:
      renovate_log_level_debug:
        type: boolean
        description: "Run Renovate with debug log levels"
        default: true

permissions:
  contents: read

jobs:
  renovate:
    name: Run self-hosted Renovate
    permissions:
      contents: read
    uses: proofhouse/github-actions/.github/workflows/renovate.yaml@8fc147c5b166239ee72e04ffc17dc85a40888d0e # v0.2.1
    secrets: inherit
    with:
      # On a schedule trigger the `inputs` context is empty; the shared
      # workflow forces DEBUG for schedule events regardless, so the
      # `|| false` fallback only needs to keep this a valid boolean.
      renovate_log_level_debug: ${{ inputs.renovate_log_level_debug || false }}
