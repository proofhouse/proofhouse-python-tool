---
# Main quality gate. Runs the Python-flavored lint set, the test
# suite (matrixed across linux/macOS/windows native runners and every
# supported CPython release, including the free-threaded build), and
# the lock-drift check on every pull request and every push to
# `main`. Each gate runs as its own job so a flake in one block does
# not require rerunning the others and the PR status surfaces which
# gate fired.
# The non-Python lint set (vale, cspell, rumdl, biome, yamllint)
# lands in follow-up workflows that handle each tool's distinct
# install path.
#
# Every job installs `just` from a SHA-pinned casey/just release
# tarball, verifies the bundled SHA256SUMS, and then invokes the
# matching `just <recipe>` so the recipe is the single source of
# truth for what the gate runs.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up just
        uses: proofhouse/github-actions/.github/actions/setup-just@c55eeb3115d95f6b8777538b4d6f49d48830e199 # v0.2.0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run Python-flavored lints
        run: just lint-py-all

  lock-check:
    name: lock-check
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up just
        uses: proofhouse/github-actions/.github/actions/setup-just@c55eeb3115d95f6b8777538b4d6f49d48830e199 # v0.2.0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Check lock drift
        run: just lock-check

  test:
    name: "test (${{ matrix.os }}, ${{ matrix.python }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15
          - windows-2025
        python:
          - '3.12'
          - '3.13'
          - '3.14'
          - '3.14t'
    # uv picks its interpreter from UV_PYTHON, so a job-level env
    # points `uv sync` and the `uv run` calls inside just recipes at
    # the matrix slot's interpreter without any recipe changes.
    env:
      UV_PYTHON: ${{ matrix.python }}
    steps:
      - name: Harden the runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up just
        uses: proofhouse/github-actions/.github/actions/setup-just@c55eeb3115d95f6b8777538b4d6f49d48830e199 # v0.2.0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      # Sync only the test group: the lint tools never run in this
      # job, and complexipy has no free-threaded wheels, so a full
      # dev-group sync would build it from source on the 3.14t slots
      # (and fail to link on Windows).
      - name: Sync dependencies
        run: uv sync --frozen --no-default-groups --group test

      # UV_NO_SYNC keeps the `uv run` inside `just test` from
      # re-syncing the default dev group over the test-only
      # environment prepared above.
      - name: Run tests
        env:
          UV_NO_SYNC: "1"
        run: just test
