---
# Main quality gate. Runs the Python-flavored lint set, the test
# suite (matrixed across linux/macOS/windows native runners and every
# supported CPython release, including the free-threaded build), and
# the lock-drift check on every pull request and every push to
# `main`. Each gate runs as its own job so a flake in one block does
# not require rerunning the others and the PR status surfaces which
# gate fired.
# The non-Python lint set (vale, cspell, rumdl, biome, yamllint)
# lands in follow-up workflows that handle each tool's distinct
# install path.
#
# Every job installs `just` from a SHA-pinned casey/just release
# tarball, verifies the bundled SHA256SUMS, and then invokes the
# matching `just <recipe>` so the recipe is the single source of
# truth for what the gate runs.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up just
        uses: proofhouse/github-actions/.github/actions/setup-just@c55eeb3115d95f6b8777538b4d6f49d48830e199 # v0.2.0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run Python-flavored lints
        run: just lint-py-all

  lock-check:
    name: lock-check
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up just
        uses: proofhouse/github-actions/.github/actions/setup-just@c55eeb3115d95f6b8777538b4d6f49d48830e199 # v0.2.0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Check lock drift
        run: just lock-check

  test:
    name: "test (${{ matrix.os }}, ${{ matrix.python }})"
    runs-on: ${{ matrix.os }}
    # Each slot publishes its own coverage report to GitHub's code
    # coverage API, which needs code-quality: write on top of the read
    # scopes (contents for checkout, pull-requests so the upload action
    # can resolve the PR number on push events). A job-level block
    # replaces the workflow default, so the reads are spelled out again.
    permissions:
      contents: read
      code-quality: write
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15
          - windows-2025
        python:
          - '3.12'
          - '3.13'
          - '3.14'
          - '3.14t'
    # uv picks its interpreter from UV_PYTHON, so a job-level env
    # points `uv sync` and the `uv run` calls inside just recipes at
    # the matrix slot's interpreter without any recipe changes.
    # HYPOTHESIS_PROFILE selects the ci profile registered in
    # tests/property/conftest.py: 500 examples per property and no
    # per-example deadline, the wider search a CI run can afford where
    # the local default stays at 50 for fast feedback.
    env:
      UV_PYTHON: ${{ matrix.python }}
      HYPOTHESIS_PROFILE: ci
    steps:
      - name: Harden the runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up just
        uses: proofhouse/github-actions/.github/actions/setup-just@c55eeb3115d95f6b8777538b4d6f49d48830e199 # v0.2.0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      # Sync only the test group: the lint tools never run in this
      # job, and complexipy has no free-threaded wheels, so a full
      # dev-group sync would build it from source on the 3.14t slots
      # (and fail to link on Windows).
      - name: Sync dependencies
        run: uv sync --frozen --no-default-groups --group test

      # Carry hypothesis's example database across runs so a failing
      # input one run discovers replays as a regression on the next,
      # rather than vanishing with the runner. The key is per-slot and
      # rolls on every commit; the restore-keys prefix means a new
      # commit still seeds from the slot's previous database instead of
      # starting empty.
      - name: Cache hypothesis examples
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .hypothesis/examples
          key: hypothesis-${{ matrix.os }}-${{ matrix.python }}-${{ github.sha }}
          restore-keys: |
            hypothesis-${{ matrix.os }}-${{ matrix.python }}-

      # UV_NO_SYNC keeps the `uv run` inside the just recipes from
      # re-syncing the default dev group over the test-only environment
      # prepared above. cover-slot runs the suite under coverage, writes
      # this slot's data to .coverage.<slot>, and renders its Cobertura.
      - name: Run tests with coverage
        env:
          UV_NO_SYNC: "1"
        run: just cover-slot "${{ matrix.os }}-${{ matrix.python }}"

      # Publish this slot's report under a per-slot label so each
      # os/python pair shows on its own, and stash the raw data file for
      # the coverage job to combine into the authoritative total.
      - name: Upload coverage report
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1.3.0
        with:
          file: coverage.xml
          language: Python
          label: code-coverage/${{ matrix.os }}-${{ matrix.python }}
          fail-on-error: false

      - name: Upload coverage data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-data-${{ matrix.os }}-${{ matrix.python }}
          path: .coverage.${{ matrix.os }}-${{ matrix.python }}
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  coverage:
    name: coverage
    runs-on: ubuntu-24.04
    needs: test
    # Publishes the combined report to the code coverage API (same
    # scopes as the per-slot uploads in the test job).
    permissions:
      contents: read
      code-quality: write
      pull-requests: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # The diff-coverage check needs the base branch to compare
      # against, so fetch full history rather than the default shallow
      # clone.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up just
        uses: proofhouse/github-actions/.github/actions/setup-just@c55eeb3115d95f6b8777538b4d6f49d48830e199 # v0.2.0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      # The combine and diff-coverage steps run from the dev group:
      # diff-cover lives there, and coverage rides in with pytest-cov.
      - name: Sync dependencies
        run: uv sync --frozen

      # Every slot wrote .coverage.<slot>; merge-multiple drops them all
      # back into the working directory under their original names so
      # `coverage combine` finds them.
      - name: Download per-slot coverage data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine coverage and enforce the threshold
        env:
          UV_NO_SYNC: "1"
        run: just cover-combine

      # The whole-tree total already enforces 100%; this fails the PR if
      # a touched line slips through uncovered, before the combined
      # total would surface it. diff-cover diffs against the base branch,
      # which a PR checkout does not leave as a tracking ref, so fetch it
      # first. github.base_ref only exists on pull requests, so the step
      # is scoped to them.
      - name: Check diff coverage
        if: github.event_name == 'pull_request'
        env:
          UV_NO_SYNC: "1"
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          just cover-diff "origin/${{ github.base_ref }}"

      - name: Upload combined coverage report
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1.3.0
        with:
          file: coverage.xml
          language: Python
          label: code-coverage/combined
          fail-on-error: false
