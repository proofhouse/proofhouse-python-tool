---
# actionlint configuration.
#
# GitHub's code-quality permission scope (which ci.yml's coverage
# upload will use once coverage reporting lands) is newer than
# actionlint's built-in scope allowlist, which still rejects it as
# unknown. actionlint v1.7.12 and its main branch both lack the
# scope, so a version bump can't clear the false positive yet. Drop
# this ignore once a release adds code-quality.
paths:
  .github/workflows/ci.yml:
    ignore:
      - 'unknown permission scope "code-quality"'
