[project]
name = "proofhouse-python-tool"
version = "0.0.0"
description = "Reference CLI for the Proofhouse Python tool reference repository"
authors = [{ name = "Tony Burns", email = "tony@tonyburns.net" }]
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.12"
dependencies = [
    "rich>=15.0.0",
    "typer>=0.26.7",
]

[project.scripts]
proofhouse-python-tool = "proofhouse_python_tool.cli:main"

[build-system]
requires = ["uv_build>=0.11.21,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-mock>=3.15.1",
    "ruff>=0.15.17",
]

[tool.pytest]
addopts = ["-ra", "--strict-markers", "--strict-config", "--import-mode=importlib"]
testpaths = ["tests"]

[tool.ruff]
line-length = 88
src = ["src"]
# The stamp module is generated by `just stamp` and gitignored; excluding
# it keeps a stamped checkout linting identically to a fresh clone.
extend-exclude = ["src/proofhouse_python_tool/_buildstamp.py"]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    # COM812 and ISC001 conflict with the formatter; ruff itself warns
    # when they are enabled alongside `ruff format`.
    "COM812",
    "ISC001",
    # Docstrings belong where they carry signal, not on every module,
    # class, and function as ritual. The pydocstyle shape rules (D2xx,
    # D4xx) still apply to every docstring that does exist.
    "D100",
    "D101",
    "D102",
    "D103",
    "D104",
    "D105",
    "D106",
    "D107",
    # License headers are enforced by the reuse SPDX gate, and CPY001
    # only runs under preview mode anyway.
    "CPY",
    # Plain TODO comments are allowed; requiring an author (TD002), an
    # issue link (TD003), or treating each one as a defect (FIX002)
    # turns lightweight notes into ceremony.
    "TD002",
    "TD003",
    "FIX002",
]

[tool.ruff.lint.isort]
known-first-party = ["proofhouse_python_tool"]

[tool.ruff.lint.mccabe]
# Sonar's default cyclomatic complexity ceiling.
max-complexity = 15

[tool.ruff.lint.per-file-ignores]
# S101: asserts are pytest's assertion API. PLR2004: literal expected
# values read better in tests than named constants. INP001: test dirs
# are intentionally __init__-free under pytest's importlib mode.
"tests/**" = ["S101", "PLR2004", "INP001"]

[tool.ruff.lint.pydocstyle]
convention = "google"
