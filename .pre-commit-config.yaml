---
default_stages: [pre-commit, pre-push]

# Hooks never touch generated or third-party trees: Vale's synced
# style packages arrive via `vale sync` and follow upstream style,
# the virtualenv is pip/uv territory, and dist/ holds build output.
exclude: ^(\.vale/(Google|write-good|proselint|ai-tells.*)/|\.venv/|dist/)

repos:
  - repo: builtin
    hooks:
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-symlinks
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/adrienverge/yamllint
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # frozen: v1.38.0
    hooks:
      - id: yamllint
        name: Check YAML files with yamllint
        entry: yamllint -c .yamllint.yaml --strict
        types: [yaml]

  - repo: https://github.com/errata-ai/vale
    rev: 810868b21c6c88cf78dfb8960b1afc78d1b7f6a8  # frozen: v3.14.2
    hooks:
      # Scope the pre-commit-stage hook to the file types .vale.ini
      # actually configures rules for (Markdown + Python source). The
      # upstream hook defaults to types: [text], which passes every
      # text file plus .git/COMMIT_EDITMSG; vale then parses the
      # commit-message buffer as plain text (no extension), backticks
      # lose their code-span meaning, and rules like Google.Spacing
      # flag dotted identifiers even inside backticks. The
      # vale-commit-msg hook from proofhouse/pre-commit-hooks (below)
      # handles the commit message with a strip-and-vale pipeline that
      # drops git's helper comments and the verbose-diff scissors
      # block before invoking vale. Extend types_or when .vale.ini
      # grows a new section.
      - id: vale
        types_or: [markdown, python]
        # Agent output template from the proofhouse package: one
        # machine-parseable line per finding.
        args: [--output=proofhouse-agent.tmpl]
        # CHANGELOG.md is generated by `cog changelog`, whose Title-Case
        # section headings ("Bug Fixes", "Continuous Integration") are a
        # cocogitto convention, not prose under this project's control.
        # The prose recipes (lint-prose, lint-markdown) already skip it
        # via --glob; .vale.ini cannot exempt it on its own because the
        # explicit per-rule toggles in [*.md] survive an empty
        # BasedOnStyles in the CHANGELOG.md block. Exclude it here too.
        exclude: ^CHANGELOG\.md$

  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: 6a851ca55fe258291f7e2a70da0279f0f98dc636  # frozen: v0.2.9
    hooks:
      - id: rumdl-fmt
      - id: rumdl

  # Shared commit-msg gates. All four run on the commit-msg stage (see the
  # manifest); commitlint and commit-trailers need only bash/git, while
  # vale-commit-msg and cspell-commit-msg lean on this repo's vale/cspell
  # plus the commit-message scope in .vale.ini and .cspell.jsonc.
  # commitlint here is a bash port of the retired Go commitlint binary.
  # Pinned by SHA with a `# frozen:` tag comment so Renovate's pre-commit
  # manager tracks it, the same as the other hook repos above.
  - repo: https://github.com/proofhouse/pre-commit-hooks
    rev: c0b78470513923f645b63e5fce3a0907c59d049d  # frozen: v0.2.0
    hooks:
      - id: commit-trailers
      - id: commitlint
      - id: vale-commit-msg
      - id: cspell-commit-msg

  - repo: local
    hooks:
      - id: biome-check
        name: biome check
        entry: biome check --write --files-ignore-unknown=true --no-errors-on-unmatched
        language: system
        types: [text]
        files: "\\.(jsx?|tsx?|c(js|ts)|m(js|ts)|d\\.(ts|cts|mts)|jsonc?|json5|css|svelte|vue|astro|graphql|gql)$"

      - id: ruff-format
        name: ruff format
        entry: just format
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-check
        name: ruff check
        entry: just lint-ruff
        language: system
        types: [python]
        pass_filenames: false

      # In the Go config type errors block commits through golangci-lint,
      # which always runs its typecheck analysis; Python needs a separate
      # checker to get the same coverage at the same stages.
      - id: pyrefly
        name: pyrefly check
        entry: just lint-types
        language: system
        types: [python]
        pass_filenames: false

      # The Go config gets its cognitive complexity ceiling at commit
      # time from golangci-lint's gocognit analyzer; complexipy is a
      # standalone tool, so a dedicated hook runs it at the same stages.
      - id: complexipy
        name: complexipy check
        entry: just lint-complexity
        language: system
        types: [python]
        pass_filenames: false

      # The Go config catches in-package dead code at commit time
      # through golangci-lint's `unused` analyzer (the whole-program
      # deadcode reachability scan stays outside its hooks); vulture
      # is a standalone tool, so a dedicated hook runs it at the same
      # stages.
      - id: vulture
        name: vulture check
        entry: just lint-deadcode
        language: system
        types: [python]
        pass_filenames: false

      # The Go config catches copy-pasted code at commit time through
      # golangci-lint's dupl analyzer; pylint's similarities checker is
      # the standalone counterpart here, so a dedicated hook runs it at
      # the same stages.
      - id: pylint-dup-code
        name: pylint duplicate-code check
        entry: just lint-dup-code
        language: system
        types: [python]
        pass_filenames: false

      # The Go config polices import boundaries at commit time through
      # golangci-lint's depguard analyzer; import-linter is the
      # standalone counterpart here, so a dedicated hook runs it at the
      # same stages.
      - id: import-linter
        name: import-linter contracts check
        entry: just lint-imports
        language: system
        types: [python]
        pass_filenames: false

      # The Go config enforces the SPDX header at commit time through
      # golangci-lint's goheader analyzer; reuse is the standalone
      # counterpart here, and it goes further by demanding a license
      # declaration for every tracked file, not just sources. No file
      # filter, because any newly added file can lack one.
      - id: reuse
        name: reuse lint
        entry: just lint-reuse
        language: system
        pass_filenames: false

      - id: lock-check
        name: uv.lock drift check
        entry: uv lock --check
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false

      # Tree-wide spell check at pre-commit and pre-push. Scoped off
      # the commit-msg stage so the cspell-commit-msg hook from
      # proofhouse/pre-commit-hooks owns the commit buffer with
      # worktree-safe config resolution.
      - id: cspell
        name: cspell
        entry: cspell --config .cspell.jsonc --no-summary --no-progress --no-must-find-files
        language: system
        stages: [pre-commit, pre-push]
        types: [text]
