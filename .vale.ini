StylesPath = .vale
MinAlertLevel = warning
Vocab = proofhouse
Packages = \
  https://github.com/errata-ai/Google/releases/download/v0.6.3/Google.zip, \
  https://github.com/errata-ai/write-good/releases/download/v0.4.1/write-good.zip, \
  https://github.com/errata-ai/proselint/releases/download/v0.3.4/proselint.zip, \
  https://github.com/tbhb/vale-ai-tells/releases/download/v1.19.0/ai-tells.zip, \
  https://github.com/tbhb/vale-ai-tells/releases/download/v1.19.0/ai-tells-commits.zip, \
  https://github.com/tbhb/vale-ai-tells/releases/download/v1.19.0/ai-tells-experimental.zip, \
  https://github.com/proofhouse/vale-proofhouse/releases/download/v0.1.0/proofhouse.zip

[formats]
COMMIT_EDITMSG = md
COMMIT_AGENTMSG = md

[*.md]
BasedOnStyles = Vale, Google, proofhouse, write-good, proselint, ai-tells, ai-tells-experimental
ai-tells.AIAdjectiveNounPairs = error
ai-tells-experimental.AverageSentenceLength = error
ai-tells-experimental.ComplexWordDensity = error
ai-tells-experimental.ContentDuplication = error
ai-tells-experimental.ContractionAvoidance = error
ai-tells-experimental.HeadingTitleCase = NO
ai-tells-experimental.LongWordDensity = NO
ai-tells-experimental.ParagraphLengthVariance = error
ai-tells-experimental.PassiveDensity = error
ai-tells-experimental.PassiveVoice = error
ai-tells-experimental.PassiveVoiceAdverb = error
ai-tells-experimental.SentenceLengthVariance = error
ai-tells-experimental.SentenceStartEntropy = error
ai-tells-experimental.SentenceStartRepetition = error
ai-tells-experimental.TransitionRepetition = error
ai-tells-experimental.TricolonDensityDocument = error
ai-tells-experimental.VocabularySwap = error
proofhouse.Acronyms = error
# ai-tells.ColonUsage (on via BasedOnStyles) exempts headings and
# acronyms, so it supersedes proofhouse.Colons outside commit messages.
proofhouse.Colons = NO
proofhouse.HeadingTitleCase = error
proofhouse.WordList = error
# Google.Acronyms is disabled: proofhouse.Acronyms is the same rule with
# project-specific exceptions (LLM, GPT, DCO). Keeping both enabled fires
# the Google version even after we add an acronym to proofhouse exceptions.
Google.Acronyms = NO
Google.Colons = NO
Google.Contractions = error
Google.Ellipses = error
Google.FirstPerson = error
Google.HeadingPunctuation = error
Google.Headings = NO
Google.OxfordComma = error
Google.Parens = NO
# The tagger-based passive rules pinned above (PassiveVoice,
# PassiveVoiceAdverb, PassiveDensity) flag every grammatical passive
# without the predicate-adjective false positives of the regex rules,
# so Google.Passive, write-good.Passive, and write-good.E-Prime stay
# off, and the style no longer ships its own Passive consolidation.
Google.Passive = NO
Google.Ranges = error
Google.Semicolons = error
Google.Spelling = error
Google.We = error
Google.Will = error
Google.WordList = NO
proselint.Annotations = NO
proselint.P-Value = error
write-good.Cliches = error
write-good.E-Prime = NO
write-good.Illusions = error
write-good.Passive = NO
write-good.TooWordy = error
write-good.Weasel = error

[{COMMIT_EDITMSG,.git/COMMIT_EDITMSG,COMMIT_AGENTMSG,.git/COMMIT_AGENTMSG}]
BasedOnStyles = Vale, Google, proselint, write-good, \
  ai-tells, ai-tells-commits, ai-tells-experimental, \
  proofhouse
ai-tells.AIAdjectiveNounPairs = error
# The DCO trailer pair (Signed-off-by:/Assisted-by:) trips ColonUsage;
# proofhouse.Colons carries the trailer exemptions, so it stays on here
# instead.
ai-tells.ColonUsage = NO
ai-tells-experimental.AverageSentenceLength = error
ai-tells-experimental.ComplexWordDensity = error
ai-tells-experimental.ContentDuplication = error
ai-tells-experimental.ContractionAvoidance = error
ai-tells-experimental.HeadingTitleCase = NO
ai-tells-experimental.LongWordDensity = NO
ai-tells-experimental.ParagraphLengthVariance = error
ai-tells-experimental.PassiveDensity = error
ai-tells-experimental.PassiveVoice = error
ai-tells-experimental.PassiveVoiceAdverb = error
ai-tells-experimental.SentenceLengthVariance = error
ai-tells-experimental.SentenceStartEntropy = error
ai-tells-experimental.SentenceStartRepetition = error
ai-tells-experimental.TransitionRepetition = error
ai-tells-experimental.TricolonDensityDocument = error
ai-tells-experimental.VocabularySwap = error
proofhouse.Colons = error
proofhouse.HeadingTitleCase = error
# Google.Acronyms disabled in favor of proofhouse.Acronyms (see the *.md
# section above for the full rationale).
Google.Acronyms = NO
Google.Colons = NO
Google.Contractions = error
Google.Ellipses = error
Google.FirstPerson = error
Google.HeadingPunctuation = error
Google.Headings = NO
Google.OxfordComma = error
Google.Parens = NO
Google.Passive = NO
Google.Ranges = error
Google.Semicolons = error
Google.Spelling = error
Google.We = error
Google.Will = error
Google.WordList = error
proselint.Annotations = NO
proselint.P-Value = error
write-good.Cliches = error
write-good.E-Prime = NO
write-good.Illusions = error
write-good.Passive = NO
write-good.TooWordy = error
write-good.Weasel = error

[*.py]
BasedOnStyles = Vale, Google, proofhouse, write-good, proselint, ai-tells, ai-tells-experimental
ai-tells.AIAdjectiveNounPairs = error
# Every Python file opens with the two-line SPDX header, whose license
# identifier names Apache-2.0 after a colon, and ColonUsage flags the
# proper noun after that colon. The
# rule's own guidance is to disable it where a colon convention is
# established, so it stays off for Python source.
ai-tells.ColonUsage = NO
ai-tells-experimental.AverageSentenceLength = error
ai-tells-experimental.ComplexWordDensity = error
ai-tells-experimental.ContentDuplication = error
ai-tells-experimental.ContractionAvoidance = error
ai-tells-experimental.HeadingTitleCase = NO
ai-tells-experimental.LongWordDensity = NO
ai-tells-experimental.ParagraphLengthVariance = error
ai-tells-experimental.PassiveDensity = error
ai-tells-experimental.PassiveVoice = error
ai-tells-experimental.PassiveVoiceAdverb = error
ai-tells-experimental.SentenceLengthVariance = error
ai-tells-experimental.SentenceStartEntropy = error
ai-tells-experimental.SentenceStartRepetition = error
ai-tells-experimental.TransitionRepetition = error
ai-tells-experimental.TricolonDensityDocument = error
ai-tells-experimental.VocabularySwap = error
proofhouse.Acronyms = error
# Superseded by ai-tells.ColonUsage (see the *.md section), which is
# itself off for Python source per the SPDX note above.
proofhouse.Colons = NO
proofhouse.HeadingTitleCase = error
proofhouse.WordList = error
# Google.Acronyms is disabled: proofhouse.Acronyms is the same rule with
# project-specific exceptions (LLM, GPT, DCO). Keeping both enabled fires
# the Google version even after we add an acronym to proofhouse exceptions.
Google.Acronyms = NO
Google.Colons = NO
Google.Contractions = error
Google.Ellipses = error
Google.FirstPerson = error
Google.HeadingPunctuation = error
Google.Headings = NO
Google.OxfordComma = error
Google.Parens = NO
# The tagger-based passive rules pinned above (PassiveVoice,
# PassiveVoiceAdverb, PassiveDensity) flag every grammatical passive
# without the predicate-adjective false positives of the regex rules,
# so Google.Passive, write-good.Passive, and write-good.E-Prime stay
# off, and the style no longer ships its own Passive consolidation.
Google.Passive = NO
Google.Ranges = error
Google.Semicolons = error
# Google.Spacing flags "importlib.metadata" and "buildmeta.get" as
# missing a space after the period. False positive on dotted Python
# identifiers; keep off for Python source.
Google.Spacing = NO
Google.Spelling = error
# Vale.Terms wants "HTTPS" uppercase, which fires on URLs like
# https://docs.kernel.org/... Off for Python source where URLs appear
# in docstrings and comments.
Vale.Terms = NO
Google.We = error
Google.Will = error
Google.WordList = NO
proselint.Annotations = NO
proselint.P-Value = error
write-good.Cliches = error
write-good.E-Prime = NO
write-good.Illusions = error
write-good.Passive = NO
write-good.TooWordy = error
write-good.Weasel = error

[.venv/**/*.py]
BasedOnStyles =

# Test files inherit the rule set from [*.py] but silence two
# ai-tells-experimental rules that misfire on table-driven test
# code:
#
#   ContentDuplication — test cases legitimately reuse literals
#                        and identifier names across functions.
#   SentenceStartRepetition — every comment on a helper function
#                             starts with "#", which the analyzer
#                             treats as a repeated sentence opener.
[**/test_*.py]
ai-tells-experimental.ContentDuplication = NO
ai-tells-experimental.SentenceStartRepetition = NO

[{CHANGELOG.md,.vale/**/*.md,tmp/**/*.md,.pytest_cache/**/*.md,.complexipy_cache/**/*.md,.venv/**/*.md}]
BasedOnStyles =
