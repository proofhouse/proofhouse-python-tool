StylesPath = .vale
MinAlertLevel = warning
Vocab = proofhouse
Packages = \
  https://github.com/errata-ai/Google/releases/download/v0.6.3/Google.zip, \
  https://github.com/errata-ai/write-good/releases/download/v0.4.1/write-good.zip, \
  https://github.com/errata-ai/proselint/releases/download/v0.3.4/proselint.zip, \
  https://github.com/tbhb/vale-ai-tells/releases/download/v1.17.1/ai-tells.zip, \
  https://github.com/tbhb/vale-ai-tells/releases/download/v1.17.1/ai-tells-commits.zip, \
  https://github.com/tbhb/vale-ai-tells/releases/download/v1.17.1/ai-tells-experimental.zip

[formats]
COMMIT_EDITMSG = md
COMMIT_AGENTMSG = md

[*.md]
BasedOnStyles = Vale, Google, proofhouse, write-good, proselint, ai-tells, ai-tells-experimental
ai-tells.AIAdjectiveNounPairs = error
ai-tells-experimental.AverageSentenceLength = error
ai-tells-experimental.ComplexWordDensity = error
ai-tells-experimental.ContentDuplication = error
ai-tells-experimental.ContractionAvoidance = error
ai-tells-experimental.HeadingTitleCase = NO
ai-tells-experimental.LongWordDensity = NO
ai-tells-experimental.ParagraphLengthVariance = error
ai-tells-experimental.SentenceLengthVariance = error
ai-tells-experimental.SentenceStartEntropy = error
ai-tells-experimental.SentenceStartRepetition = error
ai-tells-experimental.TransitionRepetition = error
ai-tells-experimental.TricolonDensityDocument = error
ai-tells-experimental.VocabularySwap = error
proofhouse.Acronyms = error
proofhouse.Colons = error
proofhouse.HeadingTitleCase = error
# proofhouse.Passive consolidates Google.Passive and write-good.Passive,
# which carry identical regex + token lists. Owning the rule here lets
# tweaks (level, tokens, message) live in one place instead of either
# upstream pack. write-good.E-Prime stays separate; it's a different
# rule that flags any "to be" verb, not just passive voice.
proofhouse.Passive = error
proofhouse.WordList = error
# Google.Acronyms is disabled: proofhouse.Acronyms is the same rule with
# project-specific exceptions (LLM, GPT, DCO). Keeping both enabled fires
# the Google version even after we add an acronym to proofhouse exceptions.
Google.Acronyms = NO
Google.Colons = NO
Google.Contractions = error
Google.Ellipses = error
Google.FirstPerson = error
Google.HeadingPunctuation = error
Google.Headings = NO
Google.OxfordComma = error
Google.Parens = NO
Google.Passive = NO
Google.Ranges = error
Google.Semicolons = error
Google.Spelling = error
Google.We = error
Google.Will = error
Google.WordList = NO
proselint.Annotations = NO
proselint.P-Value = error
write-good.Cliches = error
write-good.E-Prime = error
write-good.Illusions = error
write-good.Passive = NO
write-good.TooWordy = error
write-good.Weasel = error

[{COMMIT_EDITMSG,.git/COMMIT_EDITMSG,COMMIT_AGENTMSG,.git/COMMIT_AGENTMSG}]
BasedOnStyles = Vale, Google, proselint, write-good, \
  ai-tells, ai-tells-commits, ai-tells-experimental, \
