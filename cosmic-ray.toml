[cosmic-ray]
# The first-party package is the mutation target. cosmic-ray walks the
# directory and mutates every module under it, so naming the package
# root here keeps `mutate-all` honest as new modules land — a new file
# joins the sweep without a config edit.
module-path = "src/proofhouse_python_tool"

# Absolute per-mutant test budget in seconds, not a multiplier: cosmic-ray
# kills a mutant's run at this wall-clock ceiling and records it as
# incompetent rather than survived. The suite finishes in well under a
# second, so 30s leaves wide headroom for a mutant that drives the code
# into a slow path or a loop while still bounding a genuine hang. The
# `mutate` / `mutate-all` recipes raise it from MUTATION_TIMEOUT for a
# loaded machine.
timeout = 30.0

excluded-modules = [
    # Generated by `just stamp` and gitignored; mutating a file that is
    # absent from a fresh clone would make the sweep depend on whether the
    # working tree happens to be stamped.
    "src/proofhouse_python_tool/_buildstamp.py",
    # The testing subpackage ships for downstream suites, but its content
    # is test-support plumbing: an in-process CliRunner wrapper and the
    # hypothesis strategies that feed the property suites. Its only
    # mutable surface is strategy parameters (the `min_size=1` on a text
    # strategy); pinning those with assertions would test the generator's
    # internals rather than the tool, and the property tests already
    # exercise the values it draws. Mutation scope stays on the behavioral
    # code — the buildmeta fallback chain and the CLI surface.
    "src/proofhouse_python_tool/testing/*.py",
]

# A fast suite with no coverage plugin and no xdist: cosmic-ray reruns this
# once per mutant, so every redundant millisecond multiplies across the
# work order. `-x` bails on the first failing assertion, which is all a
# kill needs, and dropping --cov sidesteps the per-mutant coverage write.
test-command = "uv run pytest -q -x"

[cosmic-ray.distributor]
# Run mutants in-process on this machine. The http distributor exists for
# farming work across a worker pool, which a sub-second suite never needs.
name = "local"
